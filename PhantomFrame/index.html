<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PhantomFrame</title>
  <link rel="stylesheet" href="assets/css/phantom.css" />
</head>
<body>

  <div class="background"></div>

  <header>
    <h1>🔮 PhantomFrame</h1>
    <p>Steganography + Encryption Platform</p>
  </header>

  <main class="container">

    <!-- ENCODE PANEL -->
    <section class="panel" id="encodePanel">
      <h2>🖼 Encode</h2>

      <div class="dropzone" id="encodeDrop">
        <p>Drag & Drop Image</p>
      </div>

      <textarea id="secretInput" placeholder="Enter secret message..."></textarea>

      <input type="password" id="encodePassword" placeholder="Optional password" />

      <select id="bitDepth">
        <option value="1">Stealth (1-bit)</option>
        <option value="2" selected>Balanced (2-bit)</option>
        <option value="3">Capacity (3-bit)</option>
      </select>

      <button id="encodeBtn">Hide Data</button>

      <div class="progress">
        <div id="encodeProgress"></div>
      </div>

      <button id="heatmapBtn" style="display: none; margin-top: 15px; background: #ff00ff; color: white;">Show Heatmap</button>
      <canvas id="heatmapCanvas" style="display: none; max-width: 100%; margin-top: 15px; border-radius: 8px; border: 1px solid rgba(0, 242, 255, 0.3);"></canvas>

      <div class="compare-container" id="compareContainer" style="display: none;">
        <img id="originalPreview" />
        <img id="stegoPreview" />
        <input type="range" id="compareSlider" min="0" max="100" value="50" />
      </div>

      <div id="histContainer" style="display: none; margin-top: 30px;">
        <h3>Histogram Analysis</h3>
        <canvas id="histOriginal" width="400" height="150" style="width: 100%; height: 150px; background: #111; margin-bottom: 10px; border-radius: 5px;"></canvas>
        <canvas id="histStego" width="400" height="150" style="width: 100%; height: 150px; background: #111; margin-bottom: 10px; border-radius: 5px;"></canvas>
        <p id="histExplain" style="font-size: 0.8rem; color: #aaa; text-align: center;"></p>
      </div>

      <div id="lsbContainer" style="display: none; margin-top: 30px;">
        <h3>LSB Plane Viewer</h3>
        <select id="lsbBit" style="width: 100%; margin-bottom: 10px;">
          <option value="0">Bit 0 (LSB)</option>
          <option value="1">Bit 1</option>
          <option value="2">Bit 2</option>
        </select>

        <canvas id="lsbCanvas" style="width: 100%; height: auto; background: #111; border-radius: 5px; border: 1px solid rgba(0, 242, 255, 0.3);"></canvas>
        <p id="lsbExplain" style="font-size: 0.8rem; color: #aaa; text-align: center; margin-top: 10px;"></p>
      </div>
    </section>

    <!-- DECODE PANEL -->
    <section class="panel" id="decodePanel">
      <h2>🔍 Decode</h2>

      <div class="dropzone" id="decodeDrop">
        <p>Drop Stego Image</p>
      </div>

      <input type="password" id="decodePassword" placeholder="Password (if used)" />

      <select id="decodeBitDepth">
        <option value="1">1-bit</option>
        <option value="2" selected>2-bit</option>
        <option value="3">3-bit</option>
      </select>

      <button id="detectBtn" style="background: #ffaa00; color: #111; margin-bottom: 10px;">Detect Hidden Data</button>
      <p id="detectResult" style="color: #00f2ff; text-align: center; font-weight: bold; min-height: 20px; margin-bottom: 15px;"></p>

      <button id="decodeBtn">Extract Data</button>

      <textarea id="output" placeholder="Decoded output..."></textarea>
    </section>

  </main>

  <script src="src/core/crypto.js"></script>
  <script src="src/core/steganography.js"></script>
  <script src="src/core/detector.js"></script>
  <script src="src/utils/ImageProcessor.js"></script>
  <script src="src/utils/analysis.js"></script>
  <script src="assets/js/phantom.js"></script>

</body>
</html>
